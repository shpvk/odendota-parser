<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protracker Parser</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>Enter dota hero id</h1>
        </header>

        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Enter your query..." autocomplete="off">
            <button id="sendBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
            </button>
        </div>

        <div id="responseArea" class="response-area">
            <p class="placeholder-text">Waiting for input...</p>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
